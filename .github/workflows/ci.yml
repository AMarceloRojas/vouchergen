name: CI - VoucherGen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd backend && npm ci
      - run: cd backend && npm run build

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
        env:
          VITE_API_URL: https://vouchergen-production.up.railway.app

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t vouchergen-backend ./backend
      - name: Build frontend image
        run: docker build -t vouchergen-frontend ./frontend --build-arg VITE_API_URL=https://vouchergen-production.up.railway.app

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build images for scan
        run: |
          docker build -t vouchergen-backend ./backend
          docker build -t vouchergen-frontend ./frontend --build-arg VITE_API_URL=https://vouchergen-production.up.railway.app
      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vouchergen-backend
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vouchergen-frontend
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH