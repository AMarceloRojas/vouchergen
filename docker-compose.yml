services:
  db:
    image: postgres:16-alpine
    container_name: voucher_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: vouchergen_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voucher_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:admin123@db:5432/vouchergen_db?schema=public
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
